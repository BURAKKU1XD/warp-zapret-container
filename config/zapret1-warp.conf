NFQUEUE_NUM="200"

# Аналог Windows --wf-tcp / --wf-udp, но для Linux container OUTPUT.
NFQWS_PORTS_TCP="80,443,2053,2083,2087,2096,8443"
NFQWS_PORTS_UDP="443,19294:19344,50000:50100"

# На хосте заработало с запасом. В контейнере оставляем так же.
NFQWS_TCP_CONNBYTES="1:40"
NFQWS_UDP_CONNBYTES="1:12"

LISTS="/config/lists"
FAKE="/opt/zapret/files/fake"

NFQWS_ARGS=(
  # 1. UDP 443 по hostlist general/cloudflare/discord
  --filter-udp=443
  --hostlist="$LISTS/list-general.txt"
  --hostlist="$LISTS/list-general-user.txt"
  --hostlist-exclude="$LISTS/list-exclude.txt"
  --hostlist-exclude="$LISTS/list-exclude-user.txt"
  --ipset-exclude="$LISTS/ipset-exclude.txt"
  --ipset-exclude="$LISTS/ipset-exclude-user.txt"
  --dpi-desync=fake
  --dpi-desync-repeats=6
  --dpi-desync-fake-quic="$FAKE/quic_initial_www_google_com.bin"

  --new

  # 2. Discord/STUN UDP
  --filter-udp=19294-19344,50000-50100
  --filter-l7=discord,stun
  --dpi-desync=fake
  --dpi-desync-fake-discord="$FAKE/quic_initial_dbankcloud_ru.bin"
  --dpi-desync-fake-stun="$FAKE/quic_initial_dbankcloud_ru.bin"
  --dpi-desync-repeats=6

  --new

  # 3. TCP alt ports discord.media
  --filter-tcp=2053,2083,2087,2096,8443
  --hostlist-domains=discord.media
  --dpi-desync=fake
  --dpi-desync-repeats=6
  --dpi-desync-fooling=badseq
  --dpi-desync-badseq-increment=2
  --dpi-desync-fake-tls="$FAKE/tls_clienthello_www_google_com.bin"

  --new

  # 4. TCP 443 Google list
  --filter-tcp=443
  --hostlist="$LISTS/list-google.txt"
  --ip-id=zero
  --dpi-desync=fake
  --dpi-desync-repeats=6
  --dpi-desync-fooling=badseq
  --dpi-desync-badseq-increment=2
  --dpi-desync-fake-tls="$FAKE/tls_clienthello_www_google_com.bin"

  --new

  # 5. TCP 80/443 general/cloudflare
  --filter-tcp=80,443
  --hostlist="$LISTS/list-general.txt"
  --hostlist="$LISTS/list-general-user.txt"
  --hostlist-exclude="$LISTS/list-exclude.txt"
  --hostlist-exclude="$LISTS/list-exclude-user.txt"
  --ipset-exclude="$LISTS/ipset-exclude.txt"
  --ipset-exclude="$LISTS/ipset-exclude-user.txt"
  --dpi-desync=fake
  --dpi-desync-repeats=6
  --dpi-desync-fooling=badseq
  --dpi-desync-badseq-increment=2
  --dpi-desync-fake-tls="$FAKE/stun.bin"
  --dpi-desync-fake-tls="$FAKE/tls_clienthello_www_google_com.bin"
  --dpi-desync-fake-http="$FAKE/tls_clienthello_max_ru.bin"

  --new

  # 6. UDP 443 по ipset-all
  --filter-udp=443
  --ipset="$LISTS/ipset-all.txt"
  --hostlist-exclude="$LISTS/list-exclude.txt"
  --hostlist-exclude="$LISTS/list-exclude-user.txt"
  --ipset-exclude="$LISTS/ipset-exclude.txt"
  --ipset-exclude="$LISTS/ipset-exclude-user.txt"
  --dpi-desync=fake
  --dpi-desync-repeats=6
  --dpi-desync-fake-quic="$FAKE/quic_initial_www_google_com.bin"

  --new

  # 7. TCP 80/443/8443 по ipset-all
  --filter-tcp=80,443,8443
  --ipset="$LISTS/ipset-all.txt"
  --hostlist-exclude="$LISTS/list-exclude.txt"
  --hostlist-exclude="$LISTS/list-exclude-user.txt"
  --ipset-exclude="$LISTS/ipset-exclude.txt"
  --ipset-exclude="$LISTS/ipset-exclude-user.txt"
  --dpi-desync=fake
  --dpi-desync-repeats=6
  --dpi-desync-fooling=badseq
  --dpi-desync-badseq-increment=2
  --dpi-desync-fake-tls="$FAKE/stun.bin"
  --dpi-desync-fake-tls="$FAKE/tls_clienthello_www_google_com.bin"
  --dpi-desync-fake-http="$FAKE/tls_clienthello_max_ru.bin"
)
